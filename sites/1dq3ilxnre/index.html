<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>دکمه</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --text: #e8e0ff;
    --glow: #7c3aed;
    --glow2: #a855f7;
    --danger: #ef4444;
    --safe: #22c55e;
    --warning: #f59e0b;
    --neutral: #60a5fa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Vazirmatn', sans-serif;
    overflow: hidden;
    position: relative;
    user-select: none;
  }

  /* Animated background */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridShift 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridShift {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  .bg-noise {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb1 { width: 300px; height: 300px; background: rgba(124,58,237,0.15); top: -100px; right: -80px; animation-delay: 0s; }
  .orb2 { width: 200px; height: 200px; background: rgba(168,85,247,0.1); bottom: -60px; left: -60px; animation-delay: 3s; }
  .orb3 { width: 150px; height: 150px; background: rgba(239,68,68,0.08); top: 40%; left: 10%; animation-delay: 5s; }
  @keyframes orbFloat {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.1); }
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
  }

  /* Score & header */
  .header {
    text-align: center;
    animation: fadeIn 0.8s ease;
  }
  .title {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(124,58,237,0.8);
    margin-bottom: 8px;
    font-weight: 300;
  }
  .score-display {
    font-size: 48px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    text-shadow: 0 0 40px rgba(124,58,237,0.5);
  }
  .score-label {
    font-size: 12px;
    color: rgba(232,224,255,0.4);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* Message box */
  .message-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(124,58,237,0.2);
    border-radius: 16px;
    padding: 20px 24px;
    text-align: center;
    backdrop-filter: blur(10px);
    width: 100%;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .message-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(124,58,237,0.6), transparent);
  }
  .message-text {
    font-size: 17px;
    line-height: 1.7;
    color: var(--text);
    font-weight: 400;
    transition: all 0.3s ease;
  }
  .message-text.changing {
    opacity: 0;
    transform: translateY(-6px);
  }

  /* The 3D Button */
  .btn-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Outer glow rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid;
    animation: ringPulse 2.5s ease-in-out infinite;
  }
  .ring1 { width: 200px; height: 200px; border-color: rgba(124,58,237,0.3); animation-delay: 0s; }
  .ring2 { width: 240px; height: 240px; border-color: rgba(124,58,237,0.15); animation-delay: 0.4s; }
  .ring3 { width: 280px; height: 280px; border-color: rgba(124,58,237,0.08); animation-delay: 0.8s; }
  @keyframes ringPulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.6; }
  }

  /* 3D Button itself */
  .btn-3d {
    position: relative;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    cursor: pointer;
    border: none;
    outline: none;
    background: none;
    transform-style: preserve-3d;
    transition: transform 0.15s ease;
    z-index: 10;
  }

  /* 3D sphere layers */
  .sphere-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.25) 0%, transparent 50%),
      radial-gradient(circle at 65% 70%, rgba(0,0,0,0.4) 0%, transparent 50%),
      conic-gradient(
        from 0deg,
        #1a0533, #2d0a5e, #3d1278, #2d0a5e, #1a0533,
        #2d0a5e, #4a1a8a, #3d1278, #1a0533
      );
    box-shadow:
      0 20px 60px rgba(0,0,0,0.8),
      0 0 0 1px rgba(124,58,237,0.3),
      inset 0 1px 0 rgba(255,255,255,0.2),
      inset 0 -2px 6px rgba(0,0,0,0.5),
      0 0 30px rgba(124,58,237,0.4),
      0 0 60px rgba(124,58,237,0.2);
    transition: all 0.15s ease;
    overflow: hidden;
  }

  /* Texture lines on sphere */
  .sphere-outer::before {
    content: '';
    position: absolute;
    inset: -10px;
    background:
      repeating-conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(124,58,237,0.08) 1deg,
        transparent 2deg,
        transparent 6deg
      );
    animation: sphereRotate 12s linear infinite;
  }
  .sphere-outer::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 8px,
        rgba(124,58,237,0.06) 8px,
        rgba(124,58,237,0.06) 9px
      );
    animation: sphereScroll 6s linear infinite;
  }

  @keyframes sphereRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes sphereScroll {
    from { background-position: 0 0; }
    to { background-position: 0 -160px; }
  }

  /* Highlight on sphere */
  .sphere-highlight {
    position: absolute;
    top: 14px;
    left: 22px;
    width: 50px;
    height: 35px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.35) 0%, transparent 70%);
    border-radius: 50%;
    transform: rotate(-20deg);
    pointer-events: none;
  }

  /* Bottom shadow of sphere */
  .sphere-shadow {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 20px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Button text */
  .btn-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8), 0 0 20px rgba(168,85,247,0.8);
    letter-spacing: 1px;
    z-index: 2;
    pointer-events: none;
    transition: all 0.3s ease;
  }

  /* Press effect */
  .btn-3d:active .sphere-outer,
  .btn-3d.pressed .sphere-outer {
    box-shadow:
      0 8px 25px rgba(0,0,0,0.8),
      0 0 0 1px rgba(124,58,237,0.5),
      inset 0 2px 10px rgba(0,0,0,0.6),
      0 0 50px rgba(168,85,247,0.8),
      0 0 100px rgba(124,58,237,0.4);
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
      radial-gradient(circle at 65% 70%, rgba(0,0,0,0.3) 0%, transparent 50%),
      conic-gradient(
        from 0deg,
        #2d0a5e, #4a1a8a, #6b21c4, #4a1a8a, #2d0a5e,
        #4a1a8a, #7c3aed, #6b21c4, #2d0a5e
      );
  }
  .btn-3d:active,
  .btn-3d.pressed {
    transform: scale(0.94) translateY(3px);
  }

  /* Explosion particles */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    animation: particleBurst 0.8s ease-out forwards;
  }
  @keyframes particleBurst {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* Result flash overlay */
  .result-flash {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .result-flash.show {
    opacity: 1;
    animation: flashOut 0.4s ease forwards;
  }
  @keyframes flashOut {
    0% { opacity: 0.25; }
    100% { opacity: 0; }
  }

  /* Combo display */
  .combo-text {
    position: fixed;
    font-size: 28px;
    font-weight: 900;
    pointer-events: none;
    z-index: 200;
    animation: comboFloat 1s ease-out forwards;
    text-shadow: 0 0 20px currentColor;
  }
  @keyframes comboFloat {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    30% { transform: translateY(-10px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-60px) scale(1); opacity: 0; }
  }

  /* Lives */
  .lives {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .heart {
    font-size: 22px;
    transition: all 0.3s ease;
    filter: drop-shadow(0 0 6px rgba(239,68,68,0.6));
  }
  .heart.lost {
    filter: grayscale(1) opacity(0.3);
    transform: scale(0.8);
  }

  /* Streak bar */
  .streak-bar-wrap {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .streak-bar {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--glow), var(--glow2));
    transition: width 0.4s ease, background 0.3s ease;
    box-shadow: 0 0 8px rgba(124,58,237,0.6);
  }

  /* Game over screen */
  .game-over {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }
  .game-over.show { display: flex; }
  .container.hidden { display: none; }

  .game-over-title {
    font-size: 36px;
    font-weight: 900;
    color: var(--text);
    text-shadow: 0 0 30px rgba(124,58,237,0.6);
  }
  .game-over-score {
    font-size: 72px;
    font-weight: 900;
    color: var(--glow2);
    text-shadow: 0 0 40px rgba(168,85,247,0.6);
    line-height: 1;
  }
  .game-over-label {
    font-size: 13px;
    color: rgba(232,224,255,0.4);
    letter-spacing: 3px;
  }
  .restart-btn {
    background: linear-gradient(135deg, var(--glow), var(--glow2));
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    color: white;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(124,58,237,0.4);
    transition: all 0.2s ease;
  }
  .restart-btn:active { transform: scale(0.96); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Color states for message box */
  .message-box.danger { border-color: rgba(239,68,68,0.4); }
  .message-box.danger::before { background: linear-gradient(90deg, transparent, rgba(239,68,68,0.6), transparent); }
  .message-box.safe { border-color: rgba(34,197,94,0.4); }
  .message-box.safe::before { background: linear-gradient(90deg, transparent, rgba(34,197,94,0.6), transparent); }
  .message-box.warning { border-color: rgba(245,158,11,0.4); }
  .message-box.warning::before { background: linear-gradient(90deg, transparent, rgba(245,158,11,0.6), transparent); }

  .timer-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: conic-gradient(var(--glow2) var(--progress, 0%), rgba(255,255,255,0.05) 0%);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), white calc(100% - 3px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 3px), white calc(100% - 3px));
    transition: none;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-noise"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="result-flash" id="resultFlash"></div>

<!-- Main Game -->
<div class="container" id="mainContainer">

  <div class="header">
    <div class="title">آزمون اراده</div>
    <div class="score-display" id="scoreDisplay">0</div>
    <div class="score-label">امتیاز</div>
  </div>

  <div class="lives" id="livesDisplay">
    <span class="heart" id="h3">❤️</span>
    <span class="heart" id="h2">❤️</span>
    <span class="heart" id="h1">❤️</span>
  </div>

  <div class="streak-bar-wrap">
    <div class="streak-bar" id="streakBar" style="width:0%"></div>
  </div>

  <div class="message-box" id="messageBox">
    <div class="message-text" id="messageText">آماده‌ای؟</div>
  </div>

  <div class="btn-wrapper">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>

    <button class="btn-3d" id="mainBtn" onclick="handleClick()">
      <div class="timer-ring" id="timerRing"></div>
      <div class="sphere-outer"></div>
      <div class="sphere-highlight"></div>
      <div class="sphere-shadow"></div>
      <div class="btn-label" id="btnLabel">بزن!</div>
    </button>
  </div>

</div>

<!-- Game Over -->
<div class="game-over" id="gameOver">
  <div style="font-size:60px">💀</div>
  <div class="game-over-title">تموم شد!</div>
  <div class="game-over-score" id="finalScore">0</div>
  <div class="game-over-label">امتیاز نهایی</div>
  <button class="restart-btn" onclick="restartGame()">دوباره بازی</button>
</div>

<script>
const messages = [
  // Click type: 0 = must click, 1 = must NOT click
  { text: "کلیک کن!", type: 0, color: "safe" },
  { text: "بزن!", type: 0, color: "safe" },
  { text: "الان کلیک کن!", type: 0, color: "safe" },
  { text: "دکمه رو بزن!", type: 0, color: "safe" },
  { text: "منتظر چی هستی؟ بزن!", type: 0, color: "safe" },
  { text: "برو بزن!", type: 0, color: "safe" },
  { text: "یه کلیک ساده‌ست، بزن!", type: 0, color: "safe" },
  { text: "کلیک نکن!", type: 1, color: "danger" },
  { text: "نزن!", type: 1, color: "danger" },
  { text: "دستت رو بکش!", type: 1, color: "danger" },
  { text: "اگه موش دیدی کلیک نکن 🐭", type: 1, color: "warning" },
  { text: "صبر کن، کلیک نکن!", type: 1, color: "danger" },
  { text: "این دفعه نزن، خطرناکه!", type: 1, color: "danger" },
  { text: "⚠️ توقف! کلیک نکن!", type: 1, color: "danger" },
  { text: "اگه دوستم داری نزن 👀", type: 1, color: "warning" },
  { text: "دکمه داغه، نزن! 🔥", type: 1, color: "warning" },
  { text: "یه بار نزن ببین چی میشه... نزن!", type: 1, color: "danger" },
  { text: "صبر کن!... حالا بزن!", type: 0, color: "safe" },
  { text: "تله‌ست! نزن 🪤", type: 1, color: "warning" },
  { text: "اگه اعداد رو دوست داری، بزن!", type: 0, color: "safe" },
  { text: "فکر کردی نمیدونم میخوای بزنی؟ نزن!", type: 1, color: "danger" },
  { text: "بزن ببینم چی میشه 😈", type: 0, color: "safe" },
  { text: "اگه ۳ ثانیه صبر کردی، بزن!", type: 0, color: "safe" },
  { text: "این یه تله‌ست... یا نه؟ بزن!", type: 0, color: "safe" },
  { text: "نگاه نکن، نزن! 🙈", type: 1, color: "warning" },
  { text: "یه نفس بکش... حالا نزن!", type: 1, color: "danger" },
  { text: "دستت کجاست؟ پس بزن!", type: 0, color: "safe" },
  { text: "آروم باش... و نزن!", type: 1, color: "danger" },
  { text: "🚀 سریع بزن!", type: 0, color: "safe" },
  { text: "🛑 نزن، جدیم!", type: 1, color: "danger" },
];

let score = 0;
let lives = 3;
let currentMsg = null;
let gameActive = true;
let streak = 0;
let timeoutId = null;
let countdownId = null;
let timeLeft = 0;
let totalTime = 0;
let btnLocked = false;

const messageBox = document.getElementById('messageBox');
const messageText = document.getElementById('messageText');
const scoreDisplay = document.getElementById('scoreDisplay');
const resultFlash = document.getElementById('resultFlash');
const streakBar = document.getElementById('streakBar');
const timerRing = document.getElementById('timerRing');
const btnLabel = document.getElementById('btnLabel');

function getRandomMessage() {
  return messages[Math.floor(Math.random() * messages.length)];
}

function setMessage(msg) {
  messageText.classList.add('changing');
  messageBox.className = 'message-box';
  setTimeout(() => {
    messageText.textContent = msg.text;
    messageText.classList.remove('changing');
    messageBox.classList.add(msg.color);
  }, 300);
}

function startRound() {
  if (!gameActive) return;
  btnLocked = false;
  clearTimeout(timeoutId);
  clearInterval(countdownId);

  currentMsg = getRandomMessage();
  setMessage(currentMsg);

  // Faster with higher score
  const base = Math.max(1200, 3000 - score * 30);
  totalTime = base + Math.random() * 1000;
  timeLeft = totalTime;

  // Timer ring countdown
  countdownId = setInterval(() => {
    timeLeft -= 50;
    const pct = Math.max(0, (timeLeft / totalTime)) * 100;
    timerRing.style.setProperty('--progress', pct + '%');
    if (timeLeft <= 0) clearInterval(countdownId);
  }, 50);

  // Auto-timeout
  timeoutId = setTimeout(() => {
    if (!gameActive || btnLocked) return;
    btnLocked = true;
    if (currentMsg.type === 1) {
      // Good! They didn't click
      givePoint(true, "✓");
    } else {
      // Bad! They should have clicked
      loseLife();
    }
  }, totalTime);
}

function handleClick() {
  if (!gameActive || btnLocked) return;
  btnLocked = true;
  clearTimeout(timeoutId);
  clearInterval(countdownId);

  const btn = document.getElementById('mainBtn');
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 200);

  if (currentMsg.type === 0) {
    givePoint(true, "+1");
  } else {
    loseLife();
  }
}

function givePoint(success, label) {
  if (success) {
    score++;
    streak++;
    updateScore();
    updateStreak();
    showFlash('rgba(34,197,94,0.15)');
    spawnParticles('var(--safe)', '#22c55e');
    showCombo(label, '#22c55e');
  }
  setTimeout(startRound, 600);
}

function loseLife() {
  lives--;
  streak = 0;
  updateStreak();
  updateLives();
  showFlash('rgba(239,68,68,0.2)');
  shakeScreen();
  showCombo("✗", '#ef4444');

  if (lives <= 0) {
    setTimeout(endGame, 700);
  } else {
    setTimeout(startRound, 800);
  }
}

function updateScore() {
  scoreDisplay.textContent = score;
  scoreDisplay.style.transform = 'scale(1.2)';
  setTimeout(() => scoreDisplay.style.transform = 'scale(1)', 200);
}

function updateStreak() {
  const pct = Math.min(100, streak * 10);
  streakBar.style.width = pct + '%';
  if (streak >= 5) {
    streakBar.style.background = 'linear-gradient(90deg, #f59e0b, #ef4444)';
    streakBar.style.boxShadow = '0 0 12px rgba(239,68,68,0.6)';
  } else {
    streakBar.style.background = 'linear-gradient(90deg, var(--glow), var(--glow2))';
    streakBar.style.boxShadow = '0 0 8px rgba(124,58,237,0.6)';
  }
}

function updateLives() {
  for (let i = 1; i <= 3; i++) {
    const heart = document.getElementById('h' + i);
    if (i <= lives) {
      heart.classList.remove('lost');
    } else {
      heart.classList.add('lost');
    }
  }
}

function showFlash(color) {
  resultFlash.style.background = color;
  resultFlash.classList.add('show');
  setTimeout(() => resultFlash.classList.remove('show'), 400);
}

function shakeScreen() {
  document.body.style.animation = 'none';
  const container = document.getElementById('mainContainer');
  container.style.animation = 'none';
  requestAnimationFrame(() => {
    container.style.transition = 'transform 0.1s';
    container.style.transform = 'translateX(-8px)';
    setTimeout(() => { container.style.transform = 'translateX(8px)'; }, 100);
    setTimeout(() => { container.style.transform = 'translateX(-5px)'; }, 200);
    setTimeout(() => { container.style.transform = 'translateX(0)'; }, 300);
  });
}

function spawnParticles(colorVar, hexColor) {
  const btn = document.getElementById('mainBtn');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / 12) * 360;
    const dist = 60 + Math.random() * 80;
    const tx = Math.cos(angle * Math.PI / 180) * dist + 'px';
    const ty = Math.sin(angle * Math.PI / 180) * dist + 'px';
    const size = 4 + Math.random() * 6;
    p.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      width: ${size}px; height: ${size}px;
      background: ${hexColor};
      --tx: ${tx}; --ty: ${ty};
      box-shadow: 0 0 6px ${hexColor};
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

function showCombo(text, color) {
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.textContent = text;
  el.style.color = color;
  const btn = document.getElementById('mainBtn');
  const rect = btn.getBoundingClientRect();
  el.style.left = (rect.left + rect.width / 2 - 30) + 'px';
  el.style.top = (rect.top - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function endGame() {
  gameActive = false;
  clearTimeout(timeoutId);
  clearInterval(countdownId);
  document.getElementById('mainContainer').classList.add('hidden');
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOver').classList.add('show');
}

function restartGame() {
  score = 0;
  lives = 3;
  streak = 0;
  gameActive = true;
  btnLocked = false;
  currentMsg = null;
  updateScore();
  updateStreak();
  updateLives();
  streakBar.style.width = '0%';
  timerRing.style.setProperty('--progress', '100%');
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('mainContainer').classList.remove('hidden');
  setTimeout(startRound, 500);
}

// Start!
setTimeout(() => {
  messageText.textContent = "بزن دکمه رو!";
  setTimeout(startRound, 800);
}, 600);
</script>
