<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NEON CORE // Control Matrix</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap');

    :root{
      --bg:#05070d;
      --accent:#b79dff;
      --glow:#7df5ff;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Vazirmatn',sans-serif;
      color:#eaf7ff;
      background:linear-gradient(135deg,#05070d,#120a2b);
      min-height:100vh;
    }

    /* Modal */
    .modal{
      position:fixed; inset:0; background:rgba(5,5,25,0.96);
      display:flex; align-items:center; justify-content:center;
      z-index:10000; backdrop-filter:blur(12px);
    }
    .dialog{
      background:rgba(15,12,45,0.98);
      border:1px solid #b79dff;
      border-radius:28px;
      padding:35px 30px;
      max-width:520px;
      text-align:center;
      box-shadow:0 0 60px rgba(183,157,255,0.4);
    }

    .container{max-width:1450px;margin:0 auto;padding:20px}
    header{text-align:center;padding:30px 0}
    .title{
      font-size:clamp(2.8rem,6.5vw,5.2rem);
      font-weight:900;
      background:linear-gradient(90deg,#fff,#7df5ff,#b79dff,#ff9eea);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .panel{
      background:rgba(12,15,40,0.93);
      border:1px solid rgba(183,157,255,0.35);
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 0 60px rgba(183,157,255,0.3);
    }

    .section{
      margin:22px 25px;
      padding:32px;
      background:rgba(10,12,35,0.92);
      border-radius:24px;
      border:1px solid rgba(183,157,255,0.25);
    }

    /* Membership */
    .membership{
      background:linear-gradient(135deg,#2a1b5c,#1a0f3d);
      border:3px solid #ffd86b;
      border-radius:26px;
      padding:35px 25px;
      text-align:center;
      box-shadow:0 0 40px rgba(183,157,255,0.5);
    }
    .membership h2{
      font-size:2.4rem;
      margin-bottom:12px;
      background:linear-gradient(#ffd86b,#ff9eea);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .btn{
      padding:16px 36px;
      border:none;
      border-radius:50px;
      font-weight:900;
      font-size:1.15rem;
      cursor:pointer;
      transition:all 0.4s;
      box-shadow:0 8px 25px rgba(0,0,0,0.4);
    }
    .btn:hover{
      transform:translateY(-6px) scale(1.06);
      box-shadow:0 15px 35px rgba(183,157,255,0.5);
    }
    .btn-primary{background:linear-gradient(135deg,#7df5ff,#b79dff);color:#000}
    .btn-gold{background:linear-gradient(135deg,#ffd86b,#ffcc33);color:#111}

    /* Chat */
    .chat{
      height:420px; overflow-y:auto; padding:18px;
      background:#0a0a25; border-radius:20px;
      border:1px solid #7b9cff; margin-bottom:12px;
    }
    .bubble{
      padding:14px 18px; border-radius:20px; margin-bottom:14px;
      max-width:88%; line-height:1.75;
    }
    .me .bubble{background:rgba(125,245,255,0.3)}
    .bot .bubble{background:rgba(255,180,240,0.28)}

    .chat-input{
      width:100%; min-height:105px; resize:vertical;
      background:#0f0a2b; border:2px solid #7b9cff;
      border-radius:18px; padding:16px; color:#eaf7ff;
      font-size:1.05rem;
    }

    /* Image Lab - Fixed Preview */
    .upload-area{
      display:block;
      padding:32px;
      border:3px dashed #b79dff;
      border-radius:22px;
      text-align:center;
      background:rgba(15,10,40,0.7);
      color:#d0b0ff;
      font-size:1.25rem;
      cursor:pointer;
      margin:15px 0;
    }
    .preview{
      min-height:260px;
      max-height:260px;
      border:2px solid #b79dff;
      border-radius:20px;
      background:#0a0a25;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      margin-top:12px;
    }

    .toast{
      position:fixed; left:50%; bottom:35px; transform:translateX(-50%);
      padding:16px 32px; border-radius:999px; background:#b79dff;
      color:#000; font-weight:900; z-index:99999;
    }
  </style>
</head>
<body>

  <!-- Intro Modal -->
  <div class="modal" id="introModal">
    <div class="dialog">
      <h3 style="color:#d0c0ff;margin-bottom:16px">NEON CORE</h3>
      <div id="typing" style="line-height:1.85;min-height:140px;color:#b0a0ff;text-align:right"></div>
      <div style="margin-top:25px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="closeIntro()">ورود به پنل</button>
        <button class="btn btn-gold" onclick="openRubika()">عضویت در روبیکا</button>
      </div>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="title">NEON CORE</div>
      <p style="color:#a0b0ff">Control Matrix // Advanced Interface</p>
    </header>

    <div class="panel">

      <!-- Membership -->
      <div class="section">
        <div class="membership">
          <h2>رایگان وصل شو</h2>
          <p style="line-height:1.9;font-size:1.15rem;color:#e0d0ff;margin-bottom:25px">
            اگر می‌خواهید از ایپی‌های متصل استفاده کنید و بدون هزینه وصل شوید،<br>
            لطفاً عضو کانال روبیکای ما شوید.
          </p>
          <button class="btn btn-gold" onclick="openRubika()" style="padding:18px 55px;font-size:1.25rem">
            عضویت در روبیکا
          </button>
        </div>
      </div>

      <!-- Chat -->
      <div class="section">
        <div class="section-title">Neon Chat ⚡</div>
        <div class="chat" id="chatBox"></div>
        <textarea id="chatInput" class="chat-input" placeholder="پیام خود را بنویسید..."></textarea>
        <div style="margin-top:12px;display:flex;gap:10px">
          <button class="btn btn-primary" onclick="sendChat()">ارسال پیام</button>
          <button class="btn btn-pink" onclick="clearChat()">پاک کردن چت</button>
        </div>
      </div>

      <!-- Image Lab -->
      <div class="section">
        <div class="section-title">ویرایشگر تصویر ⚡</div>
        <label for="imgInput" class="upload-area">
          📸 کلیک کنید یا عکس را اینجا بکشید
        </label>
        <input type="file" id="imgInput" accept="image/*" style="display:none">
        <div class="preview" id="preview">پیش‌نمایش تصویر</div>
        
        <div style="margin-top:18px;display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="applyFilter('bw')">سیاه‌سفید</button>
          <button class="btn btn-primary" onclick="applyFilter('invert')">معکوس</button>
          <button class="btn btn-primary" onclick="applyFilter('saturate')">پررنگ</button>
          <button class="btn btn-gold" onclick="downloadImage()">دانلود تصویر</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Intro
    const introText = "سلام به پنل کاربردی NEON CORE خوش آمدید. این پنل توسط یاشار ساخته شده و برای شما به صورت رایگان قرار داده شده. امیدوارم لذت ببرید.";
    let ti = 0;
    const typingEl = document.getElementById('typing');
    function typeIntro(){
      if(ti <= introText.length){
        typingEl.textContent = introText.slice(0, ti) + (ti < introText.length ? '▍' : '');
        ti++;
        setTimeout(typeIntro, 22);
      }
    }
    typeIntro();

    function closeIntro(){
      document.getElementById('introModal').style.display = 'none';
    }

    // Rubika Transfer
    function openRubika(){
      const transfer = document.createElement('div');
      transfer.className = 'modal';
      transfer.innerHTML = `
        <div class="dialog">
          <h3 style="color:#b79dff">در حال انتقال به روبیکا...</h3>
          <p style="margin:25px 0;color:#d0c0ff">لطفا کمی صبر کنید</p>
          <div style="width:300px;height:10px;background:#221133;border-radius:999px;overflow:hidden;margin:0 auto">
            <div style="height:100%;width:0;background:linear-gradient(90deg,#b79dff,#7df5ff);animation:loadingBar 4s linear forwards"></div>
          </div>
        </div>
      `;
      document.body.appendChild(transfer);

      setTimeout(() => {
        window.open("https://rubika.ir/joing/BAEGCEFFF0WCWYZEXCASFPTCDHTOLLND", "_blank");
        transfer.remove();
      }, 4000);
    }

    // Chat
    function addMsg(text, who='bot'){
      const box = document.getElementById('chatBox');
      const row = document.createElement('div');
      row.className = `msg ${who}`;
      row.innerHTML = `<div class="bubble">${text}</div>`;
      box.appendChild(row);
      box.scrollTop = box.scrollHeight;
    }

    const replies = [
      {keys:["سلام","درود"], ans:"سلام! خیلی خوشحال شدم که اومدی ⚡"},
      {keys:["چطوری","خوبی"], ans:"خوبم، ممنون! تو چطوری؟ 😊"},
      {keys:["اسم","نام"], ans:"من Neon Chat هستم، دستیار هوشمند این پنل"},
      {keys:["مرسی","ممنون"], ans:"خواهش می‌کنم ✨"},
    ];

    function sendChat(){
      const input = document.getElementById('chatInput');
      if(!input.value.trim()) return;
      addMsg(input.value, 'me');
      const q = input.value.toLowerCase();
      input.value = '';

      setTimeout(() => {
        let answered = false;
        for(let r of replies){
          if(r.keys.some(k => q.includes(k))){
            addMsg(r.ans, 'bot');
            answered = true;
            break;
          }
        }
        if(!answered) addMsg('دریافت شد! هر سوالی داری بپرس ⚡', 'bot');
      }, 650);
    }

    function clearChat(){
      document.getElementById('chatBox').innerHTML = '';
    }

    // Image Lab - Fixed Preview
    let currentCanvas = null;
    document.getElementById('imgInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.src = ev.target.result;
        img.onload = () => {
          const prev = document.getElementById('preview');
          prev.innerHTML = '';
          currentCanvas = document.createElement('canvas');
          currentCanvas.width = Math.min(img.width, 720);
          currentCanvas.height = img.height * (currentCanvas.width / img.width);
          const ctx = currentCanvas.getContext('2d');
          ctx.drawImage(img, 0, 0, currentCanvas.width, currentCanvas.height);
          prev.appendChild(currentCanvas);
        }
      };
      reader.readAsDataURL(file);
    });

    function applyFilter(type){
      if(!currentCanvas) return alert('ابتدا عکس انتخاب کنید');
      const ctx = currentCanvas.getContext('2d');
      const imgData = ctx.getImageData(0,0,currentCanvas.width,currentCanvas.height);
      const data = imgData.data;

      if(type === 'bw'){
        for(let i=0; i<data.length; i+=4){
          const avg = (data[i]+data[i+1]+data[i+2])/3;
          data[i] = data[i+1] = data[i+2] = avg;
        }
      } else if(type === 'invert'){
        for(let i=0; i<data.length; i+=4){
          data[i] = 255-data[i];
          data[i+1] = 255-data[i+1];
          data[i+2] = 255-data[i+2];
        }
      } else if(type === 'saturate'){
        for(let i=0; i<data.length; i+=4){
          data[i] = Math.min(255, data[i]*1.6);
        }
      }
      ctx.putImageData(imgData,0,0);
      alert('✅ افکت اعمال شد');
    }

    function downloadImage(){
      if(!currentCanvas) return alert('ابتدا عکس انتخاب کنید');
      const link = document.createElement('a');
      link.download = 'neon-image.png';
      link.href = currentCanvas.toDataURL();
      link.click();
    }

    document.getElementById('chatInput').addEventListener('keypress', e => {
      if(e.key === 'Enter') sendChat();
    });
  </script>
</body>
</html>
