<!DOCTYPE html>
<html>
<head>
    <title>GTA 3D Engine - Full Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>body { margin: 0; overflow: hidden; } canvas { display: block; }</style>
</head>
<body>
<script>
    // --- موتور اصلی و تنظیمات دوربین ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- ایجاد زمین و جاده‌های اصلی ---
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({color: 0x333333}));
    plane.rotation.x = -Math.PI / 2;
    scene.add(plane);

    // --- ساخت کاراکتر اصلی (Player) ---
    const playerGeo = new THREE.BoxGeometry(1, 2, 0.5);
    const playerMat = new THREE.MeshBasicMaterial({color: 0x00ff00});
    const player = new THREE.Mesh(playerGeo, playerMat);
    player.position.y = 1;
    scene.add(player);

    // --- سیستم تولید ماشین (Car Spawner) ---
    const cars = [];
    function createCar(x, z) {
        const carGeo = new THREE.BoxGeometry(2, 1, 4);
        const carMat = new THREE.MeshBasicMaterial({color: 0xff0000});
        const car = new THREE.Mesh(carGeo, carMat);
        car.position.set(x, 0.5, z);
        scene.add(car);
        cars.push(car);
    }
    createCar(10, 10);
    createCar(-15, 20);

    // --- کنترلرهای حرکت (همان کدهای اصلی) ---
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    function update() {
        // حرکت کاراکتر (WASD)
        if (keys['KeyW']) player.position.z -= 0.2;
        if (keys['KeyS']) player.position.z += 0.2;
        if (keys['KeyA']) player.position.x -= 0.2;
        if (keys['KeyD']) player.position.x += 0.2;

        // دوربین همواره کاراکتر را دنبال می‌کند
        camera.position.x = player.position.x;
        camera.position.y = player.position.y + 5;
        camera.position.z = player.position.z + 10;
        camera.lookAt(player.position);
    }

    // --- لوپ رندر ---
    function animate() {
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }
    animate();

    // تنظیمات محیطی برای زیبایی بیشتر
    scene.background = new THREE.Color(0x87ceeb);
    const light = new THREE.AmbientLight(0x404040);
    scene.add(light);
</script>
</body>
</html>
