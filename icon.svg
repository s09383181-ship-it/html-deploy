<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3d00"/>
      <stop offset="50%" stop-color="#ff6e40"/>
      <stop offset="100%" stop-color="#ffab00"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- پس‌زمینه -->
  <rect width="512" height="512" rx="100" fill="#0a0506"/>
  <!-- دایره آتش -->
  <circle cx="256" cy="256" r="200" fill="url(#fire)" opacity="0.3"/>
  <!-- شعله -->
  <path d="M 256 80 
           C 200 140, 160 200, 180 280
           C 190 320, 220 350, 256 360
           C 292 350, 322 320, 332 280
           C 352 200, 312 140, 256 80 Z" 
        fill="url(#fire)" filter="url(#glow)"/>
  <!-- متن TNT -->
  <text x="256" y="290" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" 
        text-anchor="middle" fill="white" filter="url(#glow)">TNT</text>
  <!-- درخشش -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#shine)" opacity="0.3"/>
  <!-- MOD -->
  <text x="256" y="370" font-family="Arial, sans-serif" font-size="32" font-weight="700" 
        text-anchor="middle" fill="#ffab00" letter-spacing="6">MOD</text>
</svg>
