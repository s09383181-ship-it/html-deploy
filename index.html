<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNT MOD - دیپلوی HTML</title>
<meta name="theme-color" content="#7c3aed">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI','Tahoma',sans-serif;
  background:#0a0a14;color:#e8e8f0;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow-x:hidden;
}
.bg{
  position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse at 20% 30%,rgba(124,58,237,.25),transparent 50%),
    radial-gradient(ellipse at 80% 70%,rgba(236,72,153,.20),transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(34,211,238,.15),transparent 50%),
    #0a0a14;
}
.card{
  width:100%;max-width:640px;
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;padding:32px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.header{text-align:center;margin-bottom:24px}
.logo{
  width:60px;height:60px;margin:0 auto 16px;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  border-radius:16px;display:grid;place-items:center;
  font-size:28px;
  box-shadow:0 8px 24px rgba(124,58,237,.4);
}
h1{
  font-size:26px;font-weight:700;margin-bottom:6px;
  background:linear-gradient(135deg,#a78bfa,#f472b6);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.subtitle{color:#8a8a9e;font-size:14px}
textarea{
  width:100%;min-height:240px;
  background:#0d0d1a;border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:16px;
  color:#e8e8f0;font-family:'Courier New',monospace;
  font-size:13.5px;line-height:1.6;
  outline:none;resize:vertical;transition:all .25s;
}
textarea:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15)}
textarea::placeholder{color:#555}
.btn{
  width:100%;padding:14px;margin-top:16px;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:600;cursor:pointer;
  transition:all .25s;
  box-shadow:0 6px 20px rgba(124,58,237,.35);
}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,58,237,.5)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.status{
  margin-top:16px;padding:12px;border-radius:10px;
  font-size:13.5px;display:flex;align-items:center;gap:10px;
}
.loading{background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.2)}
.error{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.success{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.spinner{
  width:14px;height:14px;border:2px solid currentColor;
  border-top-color:transparent;border-radius:50%;
  animation:spin .8s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
.result{
  margin-top:20px;padding:18px;
  background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);
  border-radius:12px;
}
.result-label{color:#4ade80;font-size:13px;font-weight:600;margin-bottom:10px}
.link-box{
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:4px;
}
.link-box input{
  flex:1;padding:8px 12px;background:none;border:none;outline:none;
  color:#22d3ee;font-family:monospace;font-size:13px;
  direction:ltr;text-align:left;
}
.copy-btn{
  background:rgba(255,255,255,.06);border:none;color:#e8e8f0;
  padding:8px 14px;border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:600;transition:all .25s;
}
.copy-btn:hover{background:rgba(255,255,255,.12)}
.copy-btn.copied{background:#22c55e;color:#052e16}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="header">
    <div class="logo">🔥</div>
    <h1>TNT MOD....</h1>
    <p class="subtitle">کد HTML را وارد کن، لینک عمومی بگیر</p>
  </div>

  <textarea id="htmlInput" placeholder="<!DOCTYPE html>&#10;<html>&#10;  <body>&#10;    <h1>سلام دنیا!</h1>&#10;  </body>&#10;</html>"></textarea>

  <button class="btn" id="deployBtn">🚀 دیپلوی و دریافت لینک</button>

  <div id="status" class="status" style="display:none"></div>
  <div id="result" class="result" style="display:none">
    <div class="result-label">🎉 سایت شما منتشر شد!</div>
    <div class="link-box">
      <input type="text" id="liveLink" readonly>
      <button class="copy-btn" id="copyBtn">کپی</button>
    </div>
  </div>
</div>

<script>
const OWNER = "s09383181-ship-it";
const REPO  = "html-deploy";
const BRANCH = "main";

// توکن GitHub - اینجا بذار یا از کاربر بگیر
let TOKEN = localStorage.getItem("tnt_gh_token") || "";

const $ = id => document.getElementById(id);

function rand() {
  return Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-4);
}

function toFa(n) {
  return String(n).replace(/\d/g, d => "۰۱۲۳۴۵۶۷۸۹"[d]);
}

function showStatus(type, text) {
  const s = $("status");
  s.className = "status " + type;
  s.style.display = "flex";
  s.innerHTML = (type === "loading" ? '<div class="spinner"></div>' : "") + "<span>" + text + "</span>";
}

function hideStatus() { $("status").style.display = "none"; }

async function askToken() {
  if (TOKEN) return TOKEN;
  const t = prompt("توکن GitHub را وارد کن (ghp_xxx...):");
  if (!t) return null;
  // تست
  try {
    const r = await fetch("https://api.github.com/user", {headers: {Authorization: "token " + t}});
    if (!r.ok) throw new Error("نامعتبر");
    TOKEN = t;
    localStorage.setItem("tnt_gh_token", t);
    return t;
  } catch (e) {
    alert("توکن نامعتبر است");
    return null;
  }
}

async function deploy() {
  const html = $("htmlInput").value.trim();
  if (!html) {
    showStatus("error", "⚠️ لطفاً کد HTML را وارد کن");
    return;
  }
  const token = await askToken();
  if (!token) return;

  const btn = $("deployBtn");
  btn.disabled = true;
  $("result").style.display = "none";
  showStatus("loading", "در حال آپلود به GitHub...");

  try {
    const id = rand();
    const path = `sites/${id}/index.html`;
    const content = btoa(unescape(encodeURIComponent(html)));

    const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
      method: "PUT",
      headers: {
        Authorization: "token " + token,
        "Content-Type": "application/json",
        Accept: "application/vnd.github+json"
      },
      body: JSON.stringify({message: "deploy " + id, content, branch: BRANCH})
    });

    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.message || "خطای " + r.status);
    }

    const url = `https://${OWNER}.github.io/${REPO}/sites/${id}/`;

    // منتظر بمون تا GitHub Pages لینک رو سرو کنه
    showStatus("loading", "منتظر فعال شدن لینک...");
    let ok = false;
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, 3000));
      try {
        const c = await fetch(url, {cache: "no-store"});
        if (c.ok) { ok = true; break; }
      } catch (e) {}
      showStatus("loading", `منتظر فعال شدن لینک... (${toFa(i+1)}/۳۰)`);
    }

    hideStatus();
    $("liveLink").value = url;
    $("result").style.display = "block";
    if (!ok) {
      showStatus("success", "✅ آپلود شد. لینک تا ۱ دقیقه دیگر فعال می‌شود.");
    }
  } catch (e) {
    showStatus("error", "❌ " + e.message);
  } finally {
    btn.disabled = false;
  }
}

$("deployBtn").addEventListener("click", deploy);
$("copyBtn").addEventListener("click", async () => {
  const url = $("liveLink").value;
  if (!url) return;
  try {
    await navigator.clipboard.writeText(url);
    const b = $("copyBtn");
    b.textContent = "کپی شد ✓";
    b.classList.add("copied");
    setTimeout(() => { b.textContent = "کپی"; b.classList.remove("copied"); }, 1500);
  } catch (e) {
    prompt("کپی کن:", url);
  }
});

// Ctrl+Enter
$("htmlInput").addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); deploy(); }
});
$("htmlInput").focus();
</script>
</body>
</html>
